name: Deployment with Continuous Integration & Continuous Deployment (CI/CD)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend (FastAPI) Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  frontend:
    name: Frontend (Next.js) Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run frontend build
        run: npm run build

      - name: Run frontend tests
        run: npm run test --if-present

  deploy:
    name: 🚀 Deploy Backend & Frontend
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.BIKO_DEPLOY_KEY }}

      - name: Test SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "echo ✅ Connected to VPS!"

      - name: Pull latest changes & deploy
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            echo "🚀 Starting deployment on VPS..."

            cd ~/biko

            echo "🔄 Checking for local changes..."
            git fetch origin main
            if ! git diff --quiet; then
              echo "⚠️ Local changes detected. Stashing them..."
              git stash
            fi

            echo "⬇️ Pulling latest code..."
            git pull origin main

            echo "🐳 Rebuilding Docker containers..."
            docker compose down
            docker compose up -d --build

            echo "✅ Deployment completed successfully!"
          EOF



